<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>cuit影评</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(-45deg, 
        #b8e2ff,
        #ffd6e6,
        #c9ffe5,
        #ffe1c4,
        #e2d6ff
      );
      background-size: 400% 400%;
      animation: gradientBG 15s ease infinite;
      margin: 0;
      padding: 0;
    }

    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .container {
      display: flex;
      min-height: 100vh;
    }

    .sidebar {
      width: 250px;
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(10px);
      padding: 30px;
      box-shadow: 5px 0 15px rgba(0,0,0,0.1);
      border-right: 1px solid rgba(255, 255, 255, 0.5);
      z-index: 1;
    }

    .sidebar h2 {
      color: #2c3e50;
      margin-bottom: 30px;
      font-size: 24px;
      border-bottom: 3px solid #8ec5e8;
      padding-bottom: 10px;
    }

    .sidebar a {
      display: block;
      margin-bottom: 15px;
      padding: 12px 20px;
      color: #2c3e50;
      text-decoration: none;
      border-radius: 12px;
      transition: all 0.3s ease;
      background: rgba(255, 255, 255, 0.5);
    }

    .sidebar a:hover {
      background: linear-gradient(45deg, #8ec5e8, #7fcac0);
      color: white;
      transform: translateX(5px);
    }

    .main-content {
      flex: 1;
      padding: 30px;
      background: rgba(255, 255, 255, 0.3);
      backdrop-filter: blur(5px);
    }

    .movie-box {
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(10px);
      padding: 25px;
      border-radius: 15px;
      margin-bottom: 30px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      transition: all 0.3s ease;
    }

    .movie-box:hover {
      transform: translateY(-5px);
      box-shadow: 0 8px 25px rgba(0,0,0,0.15);
    }

    .movie-box h1 {
      color: #2c3e50;
      margin-bottom: 20px;
      font-size: 28px;
      border-bottom: 3px solid #8ec5e8;
      padding-bottom: 10px;
      display: inline-block;
    }

    .movie-box img {
      width: 100%;
      height: 400px;
      object-fit: cover;
      border-radius: 12px 12px 0 0;
      margin: 0;
    }

    .movie-info {
      padding: 20px;
    }

    .movie-info p {
      margin: 10px 0;
      color: #2c3e50;
      font-size: 16px;
      line-height: 1.6;
    }

    .movie-info strong {
      color: #34495e;
      margin-right: 10px;
    }

    .review-form {
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(10px);
      padding: 30px;
      border-radius: 15px;
      margin-bottom: 30px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      transition: all 0.3s ease;
    }

    .review-form:hover {
      transform: translateY(-5px);
      box-shadow: 0 8px 25px rgba(0,0,0,0.15);
    }

    .review-form h2 {
      color: #2c3e50;
      margin-bottom: 25px;
      font-size: 24px;
      border-bottom: 3px solid #8ec5e8;
      padding-bottom: 10px;
      display: inline-block;
    }

    label {
      font-weight: 500;
      margin-bottom: 8px;
      display: block;
      color: #2c3e50;
    }

    select, textarea {
      width: 100%;
      padding: 12px;
      border: 2px solid #e0e0e0;
      border-radius: 12px;
      margin-bottom: 20px;
      font-size: 16px;
      transition: all 0.3s ease;
      background: rgba(255, 255, 255, 0.9);
    }

    select:focus, textarea:focus {
      border-color: #8ec5e8;
      outline: none;
      box-shadow: 0 0 5px rgba(142, 197, 232, 0.3);
    }

    input[type="submit"] {
      width: 100%;
      padding: 12px;
      background: linear-gradient(45deg, #8ec5e8, #7fcac0);
      color: white;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-size: 16px;
      font-weight: 500;
      letter-spacing: 1px;
      transition: all 0.3s ease;
    }

    input[type="submit"]:hover {
      background: linear-gradient(45deg, #7fcac0, #8ec5e8);
      transform: translateY(-2px);
      box-shadow: 0 4px 15px rgba(142, 197, 232, 0.4);
    }

    input[type="submit"]:active {
      transform: translateY(0);
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    @media (max-width: 768px) {
      .container {
        flex-direction: column;
      }
      .sidebar {
        width: 100%;
        padding: 20px;
      }
    }
  </style>
</head>
<body>
<div class="container">
  <div class="sidebar">
    <h2>cuit影评</h2>
    <a th:href="@{/movielist(userId=${user.userId})}">电影列表</a>
    <a th:href="@{/reviews(userId=${user.userId})}">评论列表</a>
    <a href="/">退出</a>
  </div>
  <div class="main-content">
    <div class="movie-box">
      <h1 th:text="${movie.title}">Movie Title</h1>
<br>
      <img th:src="${movie.posterImage}" alt="Movie Poster" style="width: 100%; max-height: 400px; object-fit: cover;">
      <div class="movie-info" style="margin-top: 20px;">
        
        <p><strong>描述:</strong> <span th:text="${movie.description}"></span></p>
        <p><strong>上映时间:</strong> <span th:text="${movie.releaseDate}"></span></p>
        <p><strong>时长:</strong> <span th:text="${movie.runtime}"></span> 分钟</p>
        <p><strong>评分：</strong><span th:text="${movie.averageScore}"></span> 分</p>
      </div>
    </div>

    <div class="review-form">
      <h2>Add a Review</h2>
      <form th:action="@{/submitreview(movieId=${movie.movieId},userId=${user.userId})}" method="POST">
        <input type="hidden" name="movieId" th:value="${movie.movieId}">
        <label for="score">评分:</label>
        <select id="score" name="score" required>
          <option value="1">1</option>
          <option value="2">2</option>
          <option value="3">3</option>
          <option value="4">4</option>
          <option value="5">5</option>
        </select>

        <label for="content">评论:</label>
        <textarea id="content" name="content" rows="4" required></textarea>

        <input type="submit" value="提交">
      </form>
    </div>
  </div>
</div>
</body>
</html>
