<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CUIT影评 - 评论成功</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #f5f7fa;
            min-height: 100vh;
        }

        .container {
            display: flex;
            min-height: 100vh;
        }

        /* 侧边栏样式 */
        .sidebar {
            width: 260px;
            background: linear-gradient(180deg, #667eea 0%, #764ba2 100%);
            padding: 30px 20px;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
            z-index: 100;
        }

        .sidebar-header {
            text-align: center;
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.2);
        }

        .sidebar-header h2 {
            color: white;
            font-size: 24px;
            font-weight: 600;
        }

        .sidebar-header p {
            color: rgba(255,255,255,0.7);
            font-size: 12px;
            margin-top: 5px;
        }

        .nav-menu {
            list-style: none;
        }

        .nav-item {
            margin-bottom: 8px;
        }

        .nav-link {
            display: flex;
            align-items: center;
            padding: 14px 18px;
            color: rgba(255,255,255,0.9);
            text-decoration: none;
            border-radius: 12px;
            transition: all 0.3s ease;
            font-size: 15px;
        }

        .nav-link:hover {
            background: rgba(255,255,255,0.15);
            transform: translateX(5px);
        }

        .nav-icon {
            width: 22px;
            height: 22px;
            margin-right: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .nav-section {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .nav-section-title {
            color: rgba(255,255,255,0.5);
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 15px;
            padding-left: 18px;
        }

        /* 主内容区域 */
        .main-content {
            flex: 1;
            margin-left: 260px;
            padding: 30px 40px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 成功卡片 */
        .success-card {
            background: white;
            border-radius: 20px;
            padding: 60px 50px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            text-align: center;
            max-width: 450px;
            width: 100%;
        }

        .success-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #48bb78 0%, #38a169 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px;
            font-size: 40px;
        }

        .success-title {
            font-size: 28px;
            font-weight: 700;
            color: #2d3748;
            margin-bottom: 16px;
        }

        .success-message {
            color: #718096;
            font-size: 16px;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .button-group {
            display: flex;
            gap: 12px;
            justify-content: center;
        }

        .btn {
            padding: 14px 28px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s ease;
            cursor: pointer;
            border: none;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #e2e8f0;
            color: #4a5568;
        }

        .btn-secondary:hover {
            background: #cbd5e0;
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .sidebar {
                width: 100%;
                position: relative;
                height: auto;
            }

            .main-content {
                margin-left: 0;
                padding: 20px;
            }

            .container {
                flex-direction: column;
            }

            .success-card {
                padding: 40px 30px;
            }

            .button-group {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 侧边栏 -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>CUIT影评</h2>
                <p>发现好电影</p>
            </div>

            <nav>
                <ul class="nav-menu">
                    <li class="nav-item">
                        <a th:href="@{/user/home}" class="nav-link">
                            <span class="nav-icon">🏠</span>
                            首页
                        </a>
                    </li>
                    <li class="nav-item">
                        <a th:href="@{/user/movielist}" class="nav-link">
                            <span class="nav-icon">🎬</span>
                            电影列表
                        </a>
                    </li>
                    <li class="nav-item">
                        <a th:href="@{/user/reviews}" class="nav-link">
                            <span class="nav-icon">💬</span>
                            评论列表
                        </a>
                    </li>
                </ul>

                <div class="nav-section">
                    <div class="nav-section-title">账户</div>
                    <ul class="nav-menu">
                        <li class="nav-item">
                            <a href="/user/" class="nav-link">
                                <span class="nav-icon">🚪</span>
                                退出登录
                            </a>
                        </li>
                    </ul>
                </div>
            </nav>
        </aside>

        <!-- 主内容 -->
        <main class="main-content">
            <div class="success-card">
                <div class="success-icon">✓</div>
                <h1 class="success-title">评论提交成功</h1>
                <p class="success-message">感谢你的分享！你的评论已成功提交。</p>
                <div class="button-group">
                    <a th:href="@{/user/movielist}" class="btn btn-secondary">↩️ 返回列表</a>
                    <a th:href="@{/user/reviews}" class="btn btn-primary">查看评论列表</a>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
