<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CUIT影评 - 系统日志</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #f5f7fa;
            min-height: 100vh;
        }

        .container {
            display: flex;
            min-height: 100vh;
        }

        /* 侧边栏样式 */
        .sidebar {
            width: 260px;
            background: linear-gradient(180deg, #667eea 0%, #764ba2 100%);
            padding: 30px 20px;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
            z-index: 100;
        }

        .sidebar-header {
            text-align: center;
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.2);
        }

        .sidebar-header h2 {
            color: white;
            font-size: 24px;
            font-weight: 600;
        }

        .sidebar-header p {
            color: rgba(255,255,255,0.7);
            font-size: 12px;
            margin-top: 5px;
        }

        .nav-menu {
            list-style: none;
        }

        .nav-item {
            margin-bottom: 8px;
        }

        .nav-link {
            display: flex;
            align-items: center;
            padding: 14px 18px;
            color: rgba(255,255,255,0.9);
            text-decoration: none;
            border-radius: 12px;
            transition: all 0.3s ease;
            font-size: 15px;
        }

        .nav-link:hover {
            background: rgba(255,255,255,0.15);
            transform: translateX(5px);
        }

        .nav-link.active {
            background: rgba(255,255,255,0.2);
            color: white;
        }

        .nav-icon {
            width: 22px;
            height: 22px;
            margin-right: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .nav-section {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .nav-section-title {
            color: rgba(255,255,255,0.5);
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 15px;
            padding-left: 18px;
        }

        /* 主内容区域 */
        .main-content {
            flex: 1;
            margin-left: 260px;
            padding: 30px 40px;
        }

        .header {
            background: white;
            padding: 25px 30px;
            border-radius: 16px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            margin-bottom: 30px;
        }

        .header h1 {
            color: #2d3748;
            font-size: 28px;
            font-weight: 700;
        }

        .header p {
            color: #718096;
            margin-top: 8px;
            font-size: 14px;
        }

        /* 表格样式 */
        .table-container {
            background: white;
            border-radius: 16px;
            padding: 28px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 16px;
            text-align: left;
            border-bottom: 1px solid #e2e8f0;
        }

        th {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-weight: 600;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        th:first-child {
            border-radius: 10px 0 0 0;
        }

        th:last-child {
            border-radius: 0 10px 0 0;
        }

        tr:hover {
            background-color: #f7fafc;
        }

        td {
            color: #4a5568;
            font-size: 14px;
        }

        .method-badge {
            display: inline-block;
            padding: 6px 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }

        .user-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            background: #edf2f7;
            color: #4a5568;
            border-radius: 20px;
            font-size: 13px;
        }

        .time-text {
            color: #718096;
            font-size: 13px;
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .sidebar {
                width: 100%;
                position: relative;
                height: auto;
            }

            .main-content {
                margin-left: 0;
                padding: 20px;
            }

            .container {
                flex-direction: column;
            }

            th, td {
                padding: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 侧边栏 -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>CUIT影评</h2>
                <p>管理员控制台</p>
            </div>

            <nav>
                <ul class="nav-menu">
                    <li class="nav-item">
                        <a th:href="@{/home}" class="nav-link">
                            <span class="nav-icon">🏠</span>
                            首页
                        </a>
                    </li>
                </ul>

                <div class="nav-section">
                    <div class="nav-section-title">功能管理</div>
                    <ul class="nav-menu">
                        <li class="nav-item">
                            <a th:href="@{/manager}" class="nav-link">
                                <span class="nav-icon">👥</span>
                                用户管理
                            </a>
                        </li>
                        <li class="nav-item">
                            <a th:href="@{/movieManage}" class="nav-link">
                                <span class="nav-icon">🎬</span>
                                电影管理
                            </a>
                        </li>
                        <li class="nav-item">
                            <a th:href="@{/reviewsManage}" class="nav-link">
                                <span class="nav-icon">💬</span>
                                评论管理
                            </a>
                        </li>
                        <li class="nav-item">
                            <a th:href="@{/logList}" class="nav-link active">
                                <span class="nav-icon">📋</span>
                                系统日志
                            </a>
                        </li>
                    </ul>
                </div>

                <div class="nav-section">
                    <div class="nav-section-title">用户端预览</div>
                    <ul class="nav-menu">
                        <li class="nav-item">
                            <a th:href="@{/movielist}" class="nav-link" target="_blank">
                                <span class="nav-icon">🎬</span>
                                电影列表
                            </a>
                        </li>
                        <li class="nav-item">
                            <a th:href="@{/reviews}" class="nav-link" target="_blank">
                                <span class="nav-icon">💬</span>
                                评论列表
                            </a>
                        </li>
                    </ul>
                </div>

                <div class="nav-section">
                    <div class="nav-section-title">账户</div>
                    <ul class="nav-menu">
                        <li class="nav-item">
                            <a href="/" class="nav-link">
                                <span class="nav-icon">🚪</span>
                                退出登录
                            </a>
                        </li>
                    </ul>
                </div>
            </nav>
        </aside>

        <!-- 主内容 -->
        <main class="main-content">
            <!-- 头部 -->
            <div class="header">
                <h1>系统日志</h1>
                <p>查看系统操作记录和用户行为日志</p>
            </div>

            <!-- 日志表格 -->
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>操作方法</th>
                            <th>操作用户</th>
                            <th>操作时间</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="log : ${logs}">
                            <td>
                                <span class="method-badge" th:text="${log.methodName}">Method Name</span>
                            </td>
                            <td>
                                <span class="user-badge">
                                    <span>👤</span>
                                    <span th:text="${log.userName}">UserName</span>
                                </span>
                            </td>
                            <td class="time-text" th:text="${log.timestamp}">Timestamp</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>
</body>
</html>
