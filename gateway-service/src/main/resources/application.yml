spring:
  application:
    name: gateway-service
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        - id: root-redirect
          uri: no://op
          predicates:
            - Path=/
          filters:
            - RedirectTo=302, /user/login

        - id: movies-service-api
          uri: lb://movies-service
          predicates:
            - Path=/api/**, /rpc/**, /auth/**
          filters:
            - StripPrefix=0

        - id: movies-service-admin
          uri: lb://movies-service
          predicates:
            - Path=/admin/**
          filters:
            - StripPrefix=1
            - RewriteLocationResponseHeader=AS_IN_REQUEST, Location, ,

        - id: user-portal-service
          uri: lb://user-portal-service
          predicates:
            - Path=/user/**
          filters:
            - StripPrefix=1
            - RewriteLocationResponseHeader=AS_IN_REQUEST, Location, ,

        - id: recommendation-service
          uri: lb://recommendation-service
          predicates:
            - Path=/recommend/**
          filters:
            - StripPrefix=1

        - id: user-uploads
          uri: lb://user-portal-service
          predicates:
            - Path=/uploads/**
          filters:
            - StripPrefix=0

      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods: "*"
            allowedHeaders: "*"
            allowCredentials: false

server:
  port: 8080

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    hostname: localhost
    prefer-ip-address: true

logging:
  level:
    org.springframework.cloud.gateway: INFO
    edu.cuit.gateway: DEBUG
