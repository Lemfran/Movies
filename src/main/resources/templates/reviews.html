<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>影评列表 - CUIT影评</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #f5f7fa;
            min-height: 100vh;
        }

        .container {
            display: flex;
            min-height: 100vh;
        }

        /* 侧边栏样式 */
        .sidebar {
            width: 260px;
            background: linear-gradient(180deg, #667eea 0%, #764ba2 100%);
            padding: 30px 20px;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
            z-index: 100;
        }

        .sidebar-header {
            text-align: center;
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.2);
        }

        .sidebar-header h2 {
            color: white;
            font-size: 1.5rem;
            font-weight: 600;
        }

        .sidebar-header p {
            color: rgba(255,255,255,0.7);
            font-size: 0.85rem;
            margin-top: 5px;
        }

        .nav-menu {
            list-style: none;
        }

        .nav-item {
            margin-bottom: 8px;
        }

        .nav-link {
            display: flex;
            align-items: center;
            padding: 14px 18px;
            color: rgba(255,255,255,0.9);
            text-decoration: none;
            border-radius: 12px;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .nav-link:hover {
            background: rgba(255,255,255,0.15);
            color: white;
            transform: translateX(5px);
        }

        .nav-link.active {
            background: rgba(255,255,255,0.2);
            color: white;
        }

        .nav-icon {
            width: 20px;
            height: 20px;
            margin-right: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logout-btn {
            margin-top: auto;
            padding-top: 20px;
            border-top: 1px solid rgba(255,255,255,0.2);
        }

        /* 主内容区域 */
        .main-content {
            flex: 1;
            margin-left: 260px;
            padding: 30px;
        }

        .header {
            background: white;
            padding: 25px 30px;
            border-radius: 16px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            margin-bottom: 30px;
        }

        .header h1 {
            color: #1a202c;
            font-size: 1.8rem;
            font-weight: 600;
        }

        /* 影评列表 */
        .reviews-container {
            width: 100%;
        }

        .review-card {
            background: white;
            padding: 25px;
            border-radius: 16px;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            transition: all 0.3s ease;
            text-decoration: none;
            color: inherit;
            display: block;
            min-height: 200px;
        }

        .review-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 30px rgba(0,0,0,0.12);
        }

        .review-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 2px solid #e2e8f0;
        }

        .movie-info {
            flex: 1;
        }

        .movie-title {
            color: #1a202c;
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .review-date {
            color: #718096;
            font-size: 0.85rem;
        }

        .review-score {
            display: flex;
            align-items: center;
            gap: 5px;
            background: linear-gradient(135deg, #f59e0b 0%, #fbbf24 100%);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: 600;
            flex-shrink: 0;
        }

        .review-content {
            color: #4a5568;
            line-height: 1.7;
            font-size: 1rem;
            margin-bottom: 15px;
            min-height: 60px;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .review-footer {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: auto;
        }

        .user-avatar {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .username {
            color: #2d3748;
            font-weight: 600;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #718096;
        }

        .empty-state-icon {
            font-size: 4rem;
            margin-bottom: 20px;
        }

        .empty-state h3 {
            font-size: 1.3rem;
            color: #4a5568;
            margin-bottom: 10px;
        }

        @media (max-width: 768px) {
            .sidebar {
                width: 100%;
                position: relative;
                height: auto;
            }

            .main-content {
                margin-left: 0;
            }

            .container {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 侧边栏 -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>CUIT影评</h2>
                <p>发现好电影</p>
            </div>
            <nav>
                <ul class="nav-menu">
                    <li class="nav-item">
                        <a th:href="@{/home}" class="nav-link">
                            <span class="nav-icon">🏠</span>
                            首页
                        </a>
                    </li>
                    <li class="nav-item">
                        <a th:href="@{/movielist}" class="nav-link">
                            <span class="nav-icon">🎬</span>
                            电影列表
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="#" class="nav-link active">
                            <span class="nav-icon">💬</span>
                            评论列表
                        </a>
                    </li>
                </ul>
            </nav>
            <div class="logout-btn">
                <a href="/" class="nav-link">
                    <span class="nav-icon">🚪</span>
                    退出登录
                </a>
            </div>
        </aside>

        <!-- 主内容区域 -->
        <main class="main-content">
            <div class="header">
                <h1>影评列表</h1>
            </div>

            <div class="reviews-container">
                <a th:each="review : ${reviews}" th:href="@{/getmovie(movieId=${review.movieId})}" class="review-card">
                    <div class="review-header">
                        <div class="movie-info">
                            <div class="movie-title" th:text="${review.title}">电影标题</div>
                            <div class="review-date" th:text="${review.createdAt}">日期</div>
                        </div>
                        <div class="review-score">
                            <span>⭐</span>
                            <span th:text="${review.score}">0</span>
                        </div>
                    </div>
                    <div class="review-content" th:text="${review.content}">评论内容...</div>
                    <div class="review-footer">
                        <div class="user-avatar" th:text="${#strings.substring(review.username,0,1)}">U</div>
                        <span class="username" th:text="${review.username}">用户名</span>
                    </div>
                </a>

                <!-- 空状态 -->
                <div class="empty-state" th:if="${#lists.isEmpty(reviews)}">
                    <div class="empty-state-icon">📝</div>
                    <h3>暂无评论</h3>
                    <p>去电影列表选择一部喜欢的电影，写下你的第一条评论吧！</p>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
