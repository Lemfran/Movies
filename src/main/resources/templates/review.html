<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>电影详情 - CUIT影评</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #f5f7fa;
      min-height: 100vh;
    }

    .container {
      display: flex;
      min-height: 100vh;
    }

    /* 侧边栏样式 */
    .sidebar {
      width: 260px;
      background: linear-gradient(180deg, #667eea 0%, #764ba2 100%);
      padding: 30px 20px;
      position: fixed;
      height: 100vh;
      overflow-y: auto;
      z-index: 100;
    }

    .sidebar-header {
      text-align: center;
      margin-bottom: 40px;
      padding-bottom: 20px;
      border-bottom: 1px solid rgba(255,255,255,0.2);
    }

    .sidebar-header h2 {
      color: white;
      font-size: 1.5rem;
      font-weight: 600;
    }

    .sidebar-header p {
      color: rgba(255,255,255,0.7);
      font-size: 0.85rem;
      margin-top: 5px;
    }

    .nav-menu {
      list-style: none;
    }

    .nav-item {
      margin-bottom: 8px;
    }

    .nav-link {
      display: flex;
      align-items: center;
      padding: 14px 18px;
      color: rgba(255,255,255,0.9);
      text-decoration: none;
      border-radius: 12px;
      transition: all 0.3s ease;
      font-weight: 500;
    }

    .nav-link:hover {
      background: rgba(255,255,255,0.15);
      color: white;
      transform: translateX(5px);
    }

    .nav-link.active {
      background: rgba(255,255,255,0.2);
      color: white;
    }

    .nav-icon {
      width: 20px;
      height: 20px;
      margin-right: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logout-btn {
      margin-top: auto;
      padding-top: 20px;
      border-top: 1px solid rgba(255,255,255,0.2);
    }

    /* 主内容区域 */
    .main-content {
      flex: 1;
      margin-left: 260px;
      padding: 30px;
    }

    /* 电影详情卡片 */
    .movie-detail-card {
      background: white;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      margin-bottom: 30px;
    }

    .movie-header {
      position: relative;
      height: 300px;
      overflow: hidden;
    }

    .movie-backdrop {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .movie-header-overlay {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
      padding: 30px;
      color: white;
    }

    .movie-title {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .movie-meta {
      display: flex;
      gap: 20px;
      font-size: 0.95rem;
      opacity: 0.9;
    }

    .movie-body {
      padding: 30px;
    }

    .movie-info-grid {
      display: grid;
      grid-template-columns: 200px 1fr;
      gap: 30px;
    }

    .movie-poster {
      width: 100%;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }

    .movie-info {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .info-item {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .info-label {
      color: #718096;
      font-size: 0.85rem;
      font-weight: 500;
    }

    .info-value {
      color: #1a202c;
      font-size: 1rem;
    }

    .movie-rating {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, #f59e0b 0%, #fbbf24 100%);
      color: white;
      padding: 8px 16px;
      border-radius: 20px;
      font-weight: 600;
    }

    .add-review-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 14px 28px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      text-decoration: none;
      border-radius: 12px;
      font-weight: 600;
      margin-bottom: 30px;
      transition: all 0.3s ease;
      border: none;
      cursor: pointer;
      font-size: 1rem;
    }

    .add-review-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(102, 126, 234, 0.3);
    }

    /* 评论区 */
    .comments-section {
      background: white;
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    }

    .comments-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 25px;
      padding-bottom: 15px;
      border-bottom: 2px solid #e2e8f0;
    }

    .comments-title {
      font-size: 1.3rem;
      font-weight: 700;
      color: #1a202c;
    }

    .comments-count {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 0.85rem;
      font-weight: 600;
    }

    .comment {
      background: #f7fafc;
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 15px;
      transition: all 0.3s ease;
    }

    .comment:hover {
      background: #edf2f7;
      transform: translateX(5px);
    }

    .comment-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .comment-user {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .user-avatar {
      width: 35px;
      height: 35px;
      border-radius: 50%;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 600;
      font-size: 0.9rem;
    }

    .username {
      color: #2d3748;
      font-weight: 600;
    }

    .comment-date {
      color: #718096;
      font-size: 0.85rem;
    }

    .comment-content {
      color: #4a5568;
      line-height: 1.7;
      margin-bottom: 12px;
    }

    .comment-score {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: linear-gradient(135deg, #f59e0b 0%, #fbbf24 100%);
      color: white;
      padding: 5px 12px;
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: 600;
    }

    .empty-comments {
      text-align: center;
      padding: 50px 20px;
      color: #718096;
    }

    .empty-icon {
      font-size: 3rem;
      margin-bottom: 15px;
    }

    @media (max-width: 768px) {
      .sidebar {
        width: 100%;
        position: relative;
        height: auto;
      }

      .main-content {
        margin-left: 0;
      }

      .container {
        flex-direction: column;
      }

      .movie-info-grid {
        grid-template-columns: 1fr;
      }

      .movie-poster {
        max-width: 200px;
        margin: 0 auto;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- 侧边栏 -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <h2>CUIT影评</h2>
        <p>发现好电影</p>
      </div>
      <nav>
        <ul class="nav-menu">
          <li class="nav-item">
            <a th:href="@{/home}" class="nav-link">
              <span class="nav-icon">🏠</span>
              首页
            </a>
          </li>
          <li class="nav-item">
            <a th:href="@{/movielist}" class="nav-link">
              <span class="nav-icon">🎬</span>
              电影列表
            </a>
          </li>
          <li class="nav-item">
            <a th:href="@{/reviews}" class="nav-link">
              <span class="nav-icon">💬</span>
              评论列表
            </a>
          </li>
        </ul>
      </nav>
      <div class="logout-btn">
        <a href="/" class="nav-link">
          <span class="nav-icon">🚪</span>
          退出登录
        </a>
      </div>
    </aside>

    <!-- 主内容区域 -->
    <main class="main-content">
      <!-- 电影详情 -->
      <div class="movie-detail-card">
        <div class="movie-header">
          <img class="movie-backdrop" th:src="${movie.posterImage}" alt="电影背景">
          <div class="movie-header-overlay">
            <h1 class="movie-title" th:text="${movie.title}">电影标题</h1>
            <div class="movie-meta">
              <span th:text="${movie.releaseDate}">上映日期</span>
              <span th:text="${movie.runtime} + ' 分钟'">时长</span>
            </div>
          </div>
        </div>
        <div class="movie-body">
          <div class="movie-info-grid">
            <img class="movie-poster" th:src="${movie.posterImage}" alt="电影海报">
            <div class="movie-info">
              <div class="info-item">
                <span class="info-label">剧情简介</span>
                <span class="info-value" th:text="${movie.description}">电影描述</span>
              </div>
              <div class="info-item">
                <span class="info-label">综合评分</span>
                <div class="movie-rating">
                  <span>⭐</span>
                  <span th:text="${movie.averageScore} + ' 分'">0 分</span>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <a class="add-review-btn" th:href="@{/addreview(movieId=${movie.movieId})}">
        <span>✏️</span>
        <span>写影评</span>
      </a>

      <!-- 评论区 -->
      <div class="comments-section">
        <div class="comments-header">
          <h2 class="comments-title">影评</h2>
          <span class="comments-count" th:text="${#lists.size(reviews)} + ' 条'">0 条</span>
        </div>

        <div class="comment" th:each="review : ${reviews}">
          <div class="comment-header">
            <div class="comment-user">
              <div class="user-avatar" th:text="${#strings.substring(review.username,0,1)}">U</div>
              <span class="username" th:text="${review.username}">用户名</span>
            </div>
            <span class="comment-date" th:text="${review.createdAt}">日期</span>
          </div>
          <div class="comment-content" th:text="${review.content}">评论内容</div>
          <div class="comment-score">
            <span>⭐</span>
            <span th:text="${review.score} + ' 分'">0 分</span>
          </div>
        </div>

        <!-- 空状态 -->
        <div class="empty-comments" th:if="${#lists.isEmpty(reviews)}">
          <div class="empty-icon">📝</div>
          <h3>暂无影评</h3>
          <p>成为第一个评论这部电影的人吧！</p>
        </div>
      </div>
    </main>
  </div>
</body>
</html>
