<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>cuit影评</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(-45deg, 
          #e6f3ff,  /* 浅蓝 */
          #fff0f5,  /* 浅粉 */
          #f0fff4,  /* 浅绿 */
          #fff5e6,  /* 浅橙 */
          #f5f0ff   /* 浅紫 */
      );
      background-size: 400% 400%;
      animation: gradientBG 15s ease infinite;
      margin: 0;
      padding: 0;
    }

    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .container {
      display: flex;
      min-height: 100vh;
    }

    .sidebar {
      width: 250px;
      background-color: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(10px);
      padding: 30px;
      box-shadow: 0 0 20px rgba(0,0,0,0.1);
    }

    .sidebar h2 {
      color: #2c3e50;
      margin-bottom: 30px;
      font-size: 24px;
      border-bottom: 3px solid #3498db;
      padding-bottom: 10px;
    }

    .sidebar a {
      display: block;
      margin-bottom: 15px;
      padding: 12px 20px;
      color: #2c3e50;
      text-decoration: none;
      border-radius: 8px;
      transition: all 0.3s ease;
      background: rgba(255, 255, 255, 0.7);
    }

    .sidebar a:hover {
      background: linear-gradient(45deg, #7eb6e6, #89d4c4);
      color: white;
      transform: translateX(5px);
    }

    .main-content {
      flex: 1;
      padding: 30px;
    }

    .search-container {
      margin-bottom: 30px;
      display: flex;
      gap: 10px;
    }

    .search-container input[type="text"] {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(10px);
    }

    .search-container input[type="submit"] {
      padding: 12px 25px;
      border: none;
      border-radius: 8px;
      background: linear-gradient(45deg, #7eb6e6, #89d4c4);
      color: white;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .search-container input[type="submit"]:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 8px rgba(0,0,0,0.2);
    }

    .movie-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 30px;
      padding: 20px;
    }

    .movie-card {
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(10px);
      border-radius: 15px;
      overflow: hidden;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }

    .movie-card:hover {
      transform: translateY(-10px);
      box-shadow: 0 8px 25px rgba(0,0,0,0.2);
    }

    .movie-poster {
      width: 100%;
      height: 350px;
      object-fit: cover;
    }

    .movie-info {
      padding: 20px;
    }

    .movie-title {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 10px;
      color: #2c3e50;
    }

    .movie-details {
      font-size: 14px;
      color: #666;
      margin-bottom: 15px;
    }

    .review-link {
      display: inline-block;
      padding: 8px 15px;
      background: linear-gradient(45deg, #7eb6e6, #89d4c4);
      color: white;
      text-decoration: none;
      border-radius: 5px;
      transition: all 0.3s ease;
    }

    .review-link:hover {
      background: linear-gradient(45deg, #89d4c4, #7eb6e6);
      transform: translateY(-2px);
      box-shadow: 0 4px 8px rgba(0,0,0,0.2);
    }

    @media (max-width: 768px) {
      .container {
        flex-direction: column;
      }
      .sidebar {
        width: 100%;
        padding: 20px;
      }
      .movie-grid {
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      }
    }
  </style>
</head>
<body>
<div class="container">
  <div class="sidebar">
    <h2>cuit影评</h2>
    <a th:href="@{/movielist(userId=${user.userId})}">电影列表</a>
    <a th:href="@{/reviews(userId=${user.userId})}">评论列表</a>
    <a href="/">退出</a>
    <!-- 更多链接可以在这里添加 -->
  </div>
  <div class="main-content">
    <h1>电影列表</h1>
    <div class="search-container">
      <form th:action="@{/search(userId=${user.userId})}" method="post">
        <input type="text" name="title" placeholder="搜索电影...">
        <input type="submit" value="搜索">
      </form>
    </div>
    <div class="movie-grid">
      <div class="movie-card" th:each="movie : ${movies}">
        <img class="movie-poster" th:src="${movie.posterImage}" alt="Movie Poster">
        <div class="movie-info">
          <div class="movie-title" th:text="${movie.title}"></div>
          <div class="movie-details">
            <p th:text="${movie.description}"></p>
            <p>上映时间: <span th:text="${movie.releaseDate}"></span></p>
            <p>时长: <span th:text="${movie.runtime}"></span> 分钟</p>
            <p>评分:<span th:text="${movie.averageScore}"></span> 分</p>
          </div>
          <a class="review-link" th:href="@{/getmovie(movieId=${movie.movieId},userId=${user.userId})}">查看评论</a>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
