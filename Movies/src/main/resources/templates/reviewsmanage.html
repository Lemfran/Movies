<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CUIT影评 - 评论管理</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #f5f7fa;
            min-height: 100vh;
        }

        .container {
            display: flex;
            min-height: 100vh;
        }

        /* 侧边栏 */
        .sidebar { width: 260px; background: linear-gradient(180deg, #667eea 0%, #764ba2 100%); padding: 24px 16px; position: fixed; height: 100vh; overflow-y: auto; z-index: 100; display: flex; flex-direction: column; line-height: normal; }
        .sidebar-header { text-align: center; margin-bottom: 32px; padding-bottom: 16px; border-bottom: 1px solid rgba(255,255,255,0.15); }
        .sidebar-header h2 { color: white; font-size: 1.4rem; font-weight: 600; }
        .sidebar-header p { color: rgba(255,255,255,0.6); font-size: 0.8rem; margin-top: 4px; }
        .nav-menu { list-style: none; flex: 1; }
        .nav-item { margin-bottom: 4px; }
        .nav-link { display: flex; align-items: center; padding: 10px 14px; color: rgba(255,255,255,0.85); text-decoration: none; border-radius: 10px; transition: all 0.25s ease; font-weight: 500; font-size: 0.92rem; }
        .nav-link:hover { background: rgba(255,255,255,0.12); color: white; transform: translateX(3px); }
        .nav-link.active { background: rgba(255,255,255,0.2); color: white; }
        .nav-icon { width: 20px; height: 20px; margin-right: 10px; display: flex; align-items: center; justify-content: center; font-size: 16px; }

        .user-bar { margin-top: auto; padding-top: 12px; border-top: 1px solid rgba(255,255,255,0.15); position: relative; }
        .user-bar-trigger { display: flex; align-items: center; gap: 10px; padding: 10px; border-radius: 10px; cursor: pointer; transition: all 0.25s ease; user-select: none; }
        .user-bar-trigger:hover { background: rgba(255,255,255,0.12); }
        .user-bar-avatar { width: 36px; height: 36px; border-radius: 50%; background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); display: flex; align-items: center; justify-content: center; color: white; font-weight: 600; font-size: 0.9rem; flex-shrink: 0; overflow: hidden; }
        .user-bar-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .user-bar-info { flex: 1; min-width: 0; }
        .user-bar-name { color: white; font-weight: 600; font-size: 0.9rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .user-bar-chevron { color: rgba(255,255,255,0.6); font-size: 0.8rem; transition: transform 0.25s ease; }
        .user-bar.open .user-bar-chevron { transform: rotate(180deg); }
        .user-dropdown { position: absolute; bottom: calc(100% + 8px); left: 0; right: 0; background: white; border-radius: 12px; box-shadow: 0 8px 30px rgba(0,0,0,0.15); padding: 8px; opacity: 0; visibility: hidden; transform: translateY(8px); transition: all 0.25s ease; z-index: 200; }
        .user-bar.open .user-dropdown { opacity: 1; visibility: visible; transform: translateY(0); }
        .dropdown-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 8px; color: #4a5568; text-decoration: none; font-size: 0.9rem; font-weight: 500; transition: all 0.2s ease; cursor: pointer; }
        .dropdown-item:hover { background: #f7fafc; color: #667eea; }
        .dropdown-divider { height: 1px; background: #e2e8f0; margin: 6px 0; }

        /* 主内容区域 */
        .main-content {
            flex: 1;
            margin-left: 260px;
            padding: 30px 40px;
        }

        .header {
            background: white;
            padding: 25px 30px;
            border-radius: 16px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            margin-bottom: 30px;
        }

        .header h1 {
            color: #2d3748;
            font-size: 28px;
            font-weight: 700;
        }

        .header p {
            color: #718096;
            margin-top: 8px;
            font-size: 14px;
        }

        /* 评论列表 */
        .reviews-container {
            width: 100%;
        }

        .review-card {
            background: white;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            transition: all 0.3s ease;
        }

        .review-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.12);
        }

        .review-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 16px;
            padding-bottom: 16px;
        }

        .movie-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .movie-icon {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .movie-title {
            font-size: 18px;
            font-weight: 600;
            color: #2d3748;
        }

        .review-date {
            font-size: 13px;
            color: #718096;
        }

        .review-content {
            color: #4a5568;
            line-height: 1.8;
            font-size: 15px;
            margin-bottom: 16px;
            padding: 16px;
            background: #f7fafc;
            border-radius: 12px;
        }

        .review-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .user-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 14px;
            font-weight: 600;
        }

        .username {
            color: #4a5568;
            font-weight: 500;
            font-size: 14px;
        }

        .review-meta {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .score-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
        }

        .like-count-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 6px 14px;
            background: #fff0f3;
            color: #f5576c;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
        }

        .reply-indicator {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 4px 10px;
            background: #edf2f7;
            color: #718096;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            margin-left: 8px;
        }

        .delete-btn {
            padding: 8px 20px;
            background: #fed7d7;
            color: #c53030;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .delete-btn:hover {
            background: #fc8181;
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(245, 87, 108, 0.3);
        }

        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #718096;
        }

        .empty-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }

        .empty-text {
            font-size: 18px;
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .sidebar {
                width: 100%;
                position: relative;
                height: auto;
            }

            .main-content {
                margin-left: 0;
                padding: 20px;
            }

            .container {
                flex-direction: column;
            }

            .review-header {
                flex-direction: column;
                gap: 12px;
            }

            .review-footer {
                flex-direction: column;
                gap: 12px;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 侧边栏 -->
        <aside th:replace="~{adminfragments :: sidebar('reviews')}"></aside>

        <!-- 主内容 -->
        <main class="main-content">
            <!-- 头部 -->
            <div class="header">
                <h1>评论管理</h1>
                <p>审核和管理用户发表的影评</p>
            </div>

            <!-- 评论列表 -->
            <div class="reviews-container">
                <div th:if="${#lists.isEmpty(reviews)}" class="empty-state">
                    <div class="empty-icon">💬</div>
                    <div class="empty-text">暂无评论</div>
                </div>

                <form th:each="review : ${reviews}" th:action="@{/admin/deleteReview(reviewId=${review.reviewId})}" method="post">
                    <div class="review-card">
                        <div class="review-header">
                            <div class="movie-info">
                                <div class="movie-icon">🎬</div>
                                <div>
                                    <div style="display:flex;align-items:center;">
                                        <div class="movie-title" th:text="${review.title}">电影名称</div>
                                        <span class="reply-indicator" th:if="${review.parentId != null}">↳ 回复</span>
                                    </div>
                                    <div class="review-date" th:text="${#dates.format(review.createdAt, 'yyyy-MM-dd HH:mm')}">2024-01-01</div>
                                </div>
                            </div>
                        </div>
                        
                        <div class="review-content" th:text="${review.content}">评论内容...</div>
                        
                        <div class="review-footer">
                            <div class="user-info">
                                <div class="user-avatar" th:text="${#strings.substring(review.username,0,1).toUpperCase()}">U</div>
                                <span class="username" th:text="${review.username}">用户名</span>
                            </div>
                            <div class="review-meta">
                                <span class="score-badge" th:if="${review.score != null}">⭐ <span th:text="${review.score}">0.0</span> 分</span>
                                <span class="like-count-badge">❤️ <span th:text="${review.likeCount != null ? review.likeCount : 0}">0</span></span>
                                <button type="submit" class="delete-btn">🗑️ 删除评论</button>
                            </div>
                        </div>
                    </div>
                </form>
            </div>
        </main>
    </div>
    <script th:replace="~{adminfragments :: userBarScript}"></script>
</body>
</html>
