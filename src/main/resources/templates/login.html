<!DOCTYPE html>
<html>
<head>
  <title>cuit影评</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(-45deg, 
          #b8e2ff,  /* 中等浅蓝 */
          #ffd6e6,  /* 中等浅粉 */
          #c9ffe5,  /* 中等浅绿 */
          #ffe1c4,  /* 中等浅橙 */
          #e2d6ff   /* 中等浅紫 */
      );
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      animation: gradientBG 15s ease infinite;
      background-size: 400% 400%;
    }

    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .login-container {
      background-color: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(10px);
      padding: 35px;
      border-radius: 20px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
      width: 320px;
      transition: all 0.3s ease;
    }

    .login-container:hover {
      transform: translateY(-10px);
      box-shadow: 0 15px 30px rgba(0, 0, 0, 0.2);
    }

    h2 {
      color: #2c3e50;
      margin-bottom: 25px;
      font-size: 24px;
      text-align: center;
      border-bottom: 3px solid #8ec5e8;
      padding-bottom: 10px;
    }

    form {
      display: flex;
      flex-direction: column;
    }

    label {
      margin-bottom: 8px;
      color: #34495e;
      font-weight: 500;
    }

    input[type="text"],
    input[type="password"] {
      padding: 12px;
      margin-bottom: 20px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 16px;
      transition: all 0.3s ease;
    }

    input[type="text"]:focus,
    input[type="password"]:focus {
      border-color: #8ec5e8;
      outline: none;
      box-shadow: 0 0 5px rgba(142, 197, 232, 0.3);
    }

    button {
      padding: 12px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-size: 16px;
      font-weight: 500;
      margin-bottom: 15px;
      transition: all 0.3s ease;
      width: 100%;
      letter-spacing: 1px;
    }

    button[type="submit"] {
      background: linear-gradient(45deg, #8ec5e8, #7fcac0);
      color: white;
      margin-top: 10px;
    }

    button[type="submit"]:hover {
      background: linear-gradient(45deg, #7fcac0, #8ec5e8);
      transform: translateY(-2px);
      box-shadow: 0 4px 15px rgba(142, 197, 232, 0.4);
    }

    .register-button {
      background: linear-gradient(45deg, #ffd6e6, #e2d6ff);
      color: #2c3e50;
    }

    .register-button:hover {
      background: linear-gradient(45deg, #e2d6ff, #ffd6e6);
      transform: translateY(-2px);
      box-shadow: 0 4px 15px rgba(255, 214, 230, 0.4);
    }

    button:active {
      transform: translateY(0);
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
  </style>
</head>
<body>
  <div class="login-container">
    <form action="/index" method="POST">
      <h2>登录</h2>
      <label for="username">用户名:</label>
      <input type="text" id="username" name="username" required>

      <label for="password">密码:</label>
      <input type="password" id="password" name="password" required>
      <button type="submit">登录</button>
    </form>
    <button class="register-button" onclick="location.href='/register';">注册</button>
  </div>
</body>
</html>
