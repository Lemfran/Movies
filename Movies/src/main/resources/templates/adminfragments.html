<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"></head>
<body>

<!-- Admin Sidebar Fragment -->
<aside th:fragment="sidebar(activeMenu)" class="sidebar">
    <div class="sidebar-header">
        <h2>CUIT影评</h2>
        <p>管理控制台</p>
    </div>

    <nav style="flex:1;">
        <ul class="nav-menu">
            <li class="nav-item">
                <a th:href="@{/admin/home}" th:class="${activeMenu} == 'home' ? 'nav-link active' : 'nav-link'">
                    <span class="nav-icon">🏠</span>
                    首页
                </a>
            </li>
        </ul>

        <div class="nav-section">
            <div class="nav-section-title">功能管理</div>
            <ul class="nav-menu">
                <li class="nav-item">
                    <a th:href="@{/admin/manager}" th:class="${activeMenu} == 'users' ? 'nav-link active' : 'nav-link'">
                        <span class="nav-icon">👥</span>
                        用户管理
                    </a>
                </li>
                <li class="nav-item">
                    <a th:href="@{/admin/movieManage}" th:class="${activeMenu} == 'movies' ? 'nav-link active' : 'nav-link'">
                        <span class="nav-icon">🎬</span>
                        电影管理
                    </a>
                </li>
                <li class="nav-item">
                    <a th:href="@{/admin/reviewsManage}" th:class="${activeMenu} == 'reviews' ? 'nav-link active' : 'nav-link'">
                        <span class="nav-icon">💬</span>
                        评论管理
                    </a>
                </li>
                <li class="nav-item">
                    <a th:href="@{/admin/logList}" th:class="${activeMenu} == 'logs' ? 'nav-link active' : 'nav-link'">
                        <span class="nav-icon">📋</span>
                        系统日志
                    </a>
                </li>
            </ul>
        </div>
    </nav>

    <!-- Bottom Admin User Bar -->
    <div class="user-bar" id="userBar">
        <div class="user-dropdown">
            <a href="/admin/" class="dropdown-item">
                <span>🚪</span>
                <span>退出登录</span>
            </a>
        </div>
        <div class="user-bar-trigger" onclick="toggleUserBar()">
            <div class="user-bar-avatar">
                <img th:if="${user != null and user.avatar != null and user.avatar != ''}" th:src="${user.avatar}" alt="avatar">
                <span th:unless="${user != null and user.avatar != null and user.avatar != ''}" th:text="${user != null} ? ${#strings.substring(user.username,0,1).toUpperCase()} : 'A'">A</span>
            </div>
            <div class="user-bar-info">
                <div class="user-bar-name" th:text="${user != null and user.nickname != null and user.nickname != ''} ? ${user.nickname} : (${user != null} ? ${user.username} : '管理员')">管理员</div>
            </div>
            <span class="user-bar-chevron">▼</span>
        </div>
    </div>
</aside>

<!-- User Bar Script Fragment -->
<script th:fragment="userBarScript">
    function toggleUserBar() {
        document.getElementById('userBar').classList.toggle('open');
    }
    document.addEventListener('click', function(e) {
        const userBar = document.getElementById('userBar');
        if (userBar && !userBar.contains(e.target)) {
            userBar.classList.remove('open');
        }
    });
</script>

</body>
</html>
