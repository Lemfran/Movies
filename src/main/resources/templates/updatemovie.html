<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>cuit影评（管理员）</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(-45deg,
            #b8e2ff,
            #ffd6e6,
            #c9ffe5,
            #ffe1c4,
            #e2d6ff
            );
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            margin: 0;
            padding: 0;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 250px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            padding: 30px;
            box-shadow: 5px 0 15px rgba(0,0,0,0.1);
            border-right: 1px solid rgba(255, 255, 255, 0.5);
            z-index: 1;
        }

        .sidebar h2 {
            color: #2c3e50;
            margin-bottom: 30px;
            font-size: 24px;
            border-bottom: 3px solid #8ec5e8;
            padding-bottom: 10px;
        }

        .sidebar a {
            display: block;
            margin-bottom: 15px;
            padding: 12px 20px;
            color: #2c3e50;
            text-decoration: none;
            border-radius: 12px;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.5);
        }

        .sidebar a:hover {
            background: linear-gradient(45deg, #8ec5e8, #7fcac0);
            color: white;
            transform: translateX(5px);
        }

        .main-content {
            flex: 1;
            padding: 30px;
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(5px);
        }

        .main-content h1 {
            color: #2c3e50;
            margin-bottom: 30px;
            font-size: 32px;
            border-bottom: 3px solid #8ec5e8;
            padding-bottom: 10px;
            display: inline-block;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            color: #666;
        }

        .form-group input, .form-group textarea {
            border-radius: 4px;
            border: 1px solid #ccc;
            width: 100%;
            padding: 10px;
        }

        .form-group input:focus, .form-group textarea:focus {
            border-color: #007bff;
            box-shadow: 0 0 0 0.2rem rgba(0, 123, 255, 0.25);
        }

        button {
            width: 100%;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            padding: 10px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background-color: #0056b3;
        }

        @media (max-width: 768px) {
            .container {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
                padding: 20px;
            }

            .main-content {
                margin: 10px;
                padding: 20px;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="sidebar">
        <h2>cuit影评</h2>
        <a th:href="@{/userList(userId=${user.userId})}">用户列表</a>
        <a th:href="@{/movieManage(userId=${user.userId})}">电影列表</a>
        <a th:href="@{/reviewsManage(userId=${user.userId})}">评论列表</a>
        <a th:href="@{/logList(userId=${user.userId})}">日志</a>
        <a th:href="@{/movielist(userId=${user.userId})}">用户界面</a>
        <a href="/">退出</a>
    </div>
    <div class="main-content">
        <h1>编辑电影信息</h1>
        <form th:action="@{/updateMovie(userId=${user.userId},movieId=${movie.movieId})}" method="post">
            <input type="hidden" name="movieId" th:value="${movie.movieId}" />
            <div class="form-group">
                <label for="title">标题</label>
                <input type="text" class="form-control" id="title" name="title" th:value="${movie.title}" required>
            </div>
            <div class="form-group">
                <label for="posterImage">海报图片</label>
                <input type="text" class="form-control" id="posterImage" name="posterImage" th:value="${movie.posterImage}" required>
            </div>
            <div class="form-group">
                <div><label for="description">描述</label></div>
                <textarea class="form-control" id="description" name="description" rows="4" th:text="${movie.description}" required></textarea>
            </div>
            <div class="form-group">
                <label for="releaseDate">上映时间</label>
                <input type="date" id="releaseDate" name="releaseDate" th:value="${movie.releaseDate}" required>
            </div>
            <div class="form-group">
                <label for="runtime">时长（分钟）</label>
                <input type="number" class="form-control" id="runtime" name="runtime" th:value="${movie.runtime}" required>
            </div>
            <button type="submit" class="btn btn-primary">保存更改</button>
        </form>
    </div>
</div>
</body>
</html>
