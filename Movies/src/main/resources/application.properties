# 本地 fallback 配置（当 Config Server 不可用时使用）
# 实际运行时 Config Server 的配置会覆盖此处配置
spring.application.name=movies-service
server.port=8081

# 数据库配置
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/yingpingxitong?useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=123456

# Thymeleaf
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# MyBatis
mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.type-aliases-package=edu.cuit.yingpingxitong.Dao
mybatis.configuration.map-underscore-to-camel-case=true
# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.hostname=localhost

# Actuator
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always

# Spring Session Redis (多实例共享Session)
spring.session.store-type=redis
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.database=1
server.servlet.session.cookie.name=ADMIN_SESSION

