<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>电影详情 - CUIT影评</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #f5f7fa;
      min-height: 100vh;
    }

    .container {
      display: flex;
      min-height: 100vh;
    }

    /* 侧边栏样式 */
    .sidebar {
      width: 260px;
      background: linear-gradient(180deg, #667eea 0%, #764ba2 100%);
      padding: 24px 16px;
      position: fixed;
      height: 100vh;
      overflow-y: auto;
      z-index: 100;
      display: flex;
      flex-direction: column;
    }

    .sidebar-header {
      text-align: center;
      margin-bottom: 32px;
      padding-bottom: 16px;
      border-bottom: 1px solid rgba(255,255,255,0.15);
    }

    .sidebar-header h2 {
      color: white;
      font-size: 1.4rem;
      font-weight: 600;
    }

    .sidebar-header p {
      color: rgba(255,255,255,0.6);
      font-size: 0.8rem;
      margin-top: 4px;
    }

.nav-menu {
      list-style: none;
      flex: 1;
    }

    .nav-item {
      margin-bottom: 4px;
    }

    .nav-link {
      display: flex;
      align-items: center;
      padding: 10px 14px;
      color: rgba(255,255,255,0.85);
      text-decoration: none;
      border-radius: 10px;
      transition: all 0.25s ease;
      font-weight: 500;
      font-size: 0.92rem;
    }

    .nav-link:hover {
      background: rgba(255,255,255,0.12);
      color: white;
      transform: translateX(3px);
    }

    .nav-link.active {
      background: rgba(255,255,255,0.2);
      color: white;
    }

    .nav-icon {
      width: 20px;
      height: 20px;
      margin-right: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
    }

    .user-bar {
        margin-top: auto;
        padding-top: 12px;
        border-top: 1px solid rgba(255,255,255,0.15);
        position: relative;
    }

    .user-bar-trigger {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px;
        border-radius: 10px;
        cursor: pointer;
        transition: all 0.25s ease;
        user-select: none;
    }

    .user-bar-trigger:hover {
        background: rgba(255,255,255,0.12);
    }

    .user-bar-avatar {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-weight: 600;
        font-size: 0.9rem;
        flex-shrink: 0;
        overflow: hidden;
    }

    .user-bar-avatar img {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }

    .user-bar-info {
        flex: 1;
        min-width: 0;
    }

    .user-bar-name {
        color: white;
        font-weight: 600;
        font-size: 0.9rem;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }

    .user-bar-chevron {
        color: rgba(255,255,255,0.6);
        font-size: 0.8rem;
        transition: transform 0.25s ease;
    }

    .user-bar.open .user-bar-chevron {
        transform: rotate(180deg);
    }

    .user-dropdown {
        position: absolute;
        bottom: calc(100% + 8px);
        left: 0;
        right: 0;
        background: white;
        border-radius: 12px;
        box-shadow: 0 8px 30px rgba(0,0,0,0.15);
        padding: 8px;
        opacity: 0;
        visibility: hidden;
        transform: translateY(8px);
        transition: all 0.25s ease;
        z-index: 200;
    }

    .user-bar.open .user-dropdown {
        opacity: 1;
        visibility: visible;
        transform: translateY(0);
    }

    .dropdown-item {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px 12px;
        border-radius: 8px;
        color: #4a5568;
        text-decoration: none;
        font-size: 0.9rem;
        font-weight: 500;
        transition: all 0.2s ease;
        cursor: pointer;
    }

    .dropdown-item:hover {
        background: #f7fafc;
        color: #667eea;
    }

    .dropdown-divider {
        height: 1px;
        background: #e2e8f0;
        margin: 6px 0;
    }

    /* 主内容区域 */
    .main-content {
      flex: 1;
      margin-left: 260px;
      padding: 30px;
    }

    /* 电影详情卡片 */
    .movie-detail-card {
      background: white;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      margin-bottom: 30px;
    }

    .movie-header {
      position: relative;
      height: 300px;
      overflow: hidden;
    }

    .movie-backdrop {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .movie-header-overlay {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
      padding: 30px;
      color: white;
    }

    .movie-title {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .movie-meta {
      display: flex;
      gap: 20px;
      font-size: 0.95rem;
      opacity: 0.9;
    }

    .movie-body {
      padding: 30px;
    }

    .movie-info-grid {
      display: grid;
      grid-template-columns: 200px 1fr;
      gap: 30px;
    }

    .movie-poster {
      width: 100%;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }

    .movie-info {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .info-item {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .info-label {
      color: #718096;
      font-size: 0.85rem;
      font-weight: 500;
    }

    .info-value {
      color: #1a202c;
      font-size: 1rem;
    }

    .movie-rating {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: linear-gradient(135deg, #f59e0b 0%, #fbbf24 100%);
      color: white;
      padding: 8px 16px;
      border-radius: 20px;
      font-weight: 600;
    }

    /* 小数星级 */
    .star-bar { display: inline-flex; gap: 1px; font-size: 0.85rem; }
    .star-fill {
        background: linear-gradient(90deg, #fff var(--pct), rgba(255,255,255,0.4) var(--pct));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
    }

    .add-review-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 14px 28px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      text-decoration: none;
      border-radius: 12px;
      font-weight: 600;
      margin-bottom: 30px;
      transition: all 0.3s ease;
      border: none;
      cursor: pointer;
      font-size: 1rem;
    }

    .add-review-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(102, 126, 234, 0.3);
    }

    /* 评论区 */
    .comments-section {
      background: white;
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    }

    .comments-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 25px;
      padding-bottom: 15px;
      border-bottom: 2px solid #e2e8f0;
    }

    .comments-title {
      font-size: 1.3rem;
      font-weight: 700;
      color: #1a202c;
    }

    .comments-count {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 0.85rem;
      font-weight: 600;
    }

    .comment {
      background: #f7fafc;
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 15px;
      transition: all 0.3s ease;
    }

    .comment:hover {
      background: #edf2f7;
      transform: translateX(5px);
    }

    .comment-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .comment-user {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .user-avatar {
      width: 35px;
      height: 35px;
      border-radius: 50%;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 600;
      font-size: 0.9rem;
      overflow: hidden;
      flex-shrink: 0;
    }

    .user-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .username {
      color: #2d3748;
      font-weight: 600;
    }

    .comment-date {
      color: #718096;
      font-size: 0.85rem;
    }

    .comment-content {
      color: #4a5568;
      line-height: 1.7;
      margin-bottom: 12px;
    }

    .comment-score {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: linear-gradient(135deg, #f59e0b 0%, #fbbf24 100%);
      color: white;
      padding: 5px 12px;
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: 600;
    }

    .comment-actions {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 10px;
    }

    .like-btn, .reply-btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 6px 14px;
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      border: none;
      background: #e2e8f0;
      color: #4a5568;
      text-decoration: none;
      transition: all 0.2s ease;
    }

    .like-btn:hover { background: #edf2f7; }
    .like-btn.liked {
      background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
      color: white;
    }

    .reply-btn:hover { background: #edf2f7; color: #667eea; }

    .replies-list {
      margin-top: 14px;
      margin-left: 45px;
      padding-left: 16px;
      border-left: 3px solid #e2e8f0;
    }

    .reply {
      background: white;
      padding: 12px 16px;
      border-radius: 10px;
      margin-bottom: 10px;
    }

    .reply-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
    }

    .reply-content {
      color: #4a5568;
      font-size: 0.9rem;
      line-height: 1.5;
    }

    .reply-form {
      display: none;
      margin-top: 12px;
      margin-left: 45px;
    }

    .reply-form.active { display: block; }

    .reply-form textarea {
      width: 100%;
      padding: 12px;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      font-size: 0.95rem;
      resize: vertical;
      min-height: 80px;
      margin-bottom: 10px;
    }

    .reply-form textarea:focus {
      outline: none;
      border-color: #667eea;
    }

    .reply-form-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
    }

    .reply-submit, .reply-cancel {
      padding: 8px 18px;
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
    }

    .reply-submit {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }

    .reply-cancel {
      background: #e2e8f0;
      color: #4a5568;
    }

    .empty-comments {
      text-align: center;
      padding: 50px 20px;
      color: #718096;
    }

    .empty-icon {
      font-size: 3rem;
      margin-bottom: 15px;
    }

    /* 写影评弹窗 */
    .modal-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.5);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      padding: 20px;
    }
    .modal-overlay.active { display: flex; }
    .modal-box {
      background: white;
      border-radius: 20px;
      width: 100%;
      max-width: 520px;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
      animation: modalIn 0.3s ease;
    }
    @keyframes modalIn {
      from { opacity: 0; transform: translateY(20px) scale(0.96); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
    .modal-header {
      padding: 24px 28px 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .modal-header h2 {
      font-size: 1.3rem;
      font-weight: 700;
      color: #1a202c;
    }
    .modal-close {
      width: 36px; height: 36px;
      border-radius: 50%;
      border: none;
      background: #f1f3f5;
      color: #718096;
      font-size: 1.2rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
    }
    .modal-close:hover { background: #e2e8f0; color: #4a5568; }
    .modal-body {
      padding: 20px 28px 28px;
    }
    .modal-form-group {
      margin-bottom: 20px;
    }
    .modal-form-label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: #4a5568;
      margin-bottom: 8px;
    }
    .modal-form-select {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #e2e8f0;
      border-radius: 12px;
      font-size: 0.95rem;
      background: white;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    .modal-form-select:focus {
      outline: none;
      border-color: #667eea;
    }
    .modal-form-textarea {
      width: 100%;
      padding: 14px 16px;
      border: 2px solid #e2e8f0;
      border-radius: 12px;
      font-size: 0.95rem;
      resize: vertical;
      min-height: 140px;
      font-family: inherit;
      transition: all 0.3s ease;
    }
    .modal-form-textarea:focus {
      outline: none;
      border-color: #667eea;
    }
    .modal-submit-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    .modal-submit-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(102, 126, 234, 0.3);
    }

    /* 评论区底部写影评按钮 */
    .write-review-bar {
      display: flex;
      justify-content: center;
      padding: 20px 0 0;
    }
    .write-review-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 28px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    .write-review-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(102, 126, 234, 0.3);
    }

    @media (max-width: 768px) {
      .sidebar {
        width: 100%;
        position: relative;
        height: auto;
      }

      .main-content {
        margin-left: 0;
      }

      .container {
        flex-direction: column;
      }

      .movie-info-grid {
        grid-template-columns: 1fr;
      }

      .movie-poster {
        max-width: 200px;
        margin: 0 auto;
      }

      .modal-box {
        max-width: 100%;
        border-radius: 16px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- 侧边栏 -->
    <aside th:replace="~{fragments :: sidebar('')}"></aside>

    <!-- 主内容区域 -->
    <main class="main-content">
      <!-- 电影详情 -->
      <div class="movie-detail-card">
        <div class="movie-header">
          <img class="movie-backdrop" th:src="${movie.posterImage}" alt="电影背景">
          <div class="movie-header-overlay">
            <h1 class="movie-title" th:text="${movie.title}">电影标题</h1>
            <div class="movie-meta">
              <span th:text="${movie.releaseDate}">上映日期</span>
              <span th:text="${movie.runtime} + ' 分钟'">时长</span>
            </div>
          </div>
        </div>
        <div class="movie-body">
          <div class="movie-info-grid">
            <img class="movie-poster" th:src="${movie.posterImage}" alt="电影海报">
            <div class="movie-info">
              <div class="info-item">
                <span class="info-label">剧情简介</span>
                <span class="info-value" th:text="${movie.description}">电影描述</span>
              </div>
              <div class="info-item">
                <span class="info-label">综合评分</span>
                <div class="movie-rating">
                  <span class="star-bar">
                    <span th:each="i : ${#numbers.sequence(1, 5)}"
                          class="star-fill"
                          th:style="'--pct:' + ${(movie.averageScore >= i) ? 100 : (movie.averageScore > (i - 1) ? (movie.averageScore - i + 1) * 100 : 0)} + '%'">★</span>
                  </span>
                  <span th:text="${#numbers.formatDecimal(movie.averageScore, 1, 1)} + ' 分'">0.0 分</span>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- 影评区 -->
      <div class="comments-section">
        <div class="comments-header">
          <h2 class="comments-title">影评</h2>
          <span class="comments-count" th:text="${#lists.size(reviews)} + ' 条'">0 条</span>
        </div>

        <div class="comment" th:each="review : ${reviews}" th:id="'review-' + ${review.reviewId}">
          <div class="comment-header">
            <div class="comment-user">
              <div class="user-avatar">
                <img th:if="${review.avatar != null and review.avatar != ''}" th:src="${review.avatar}" alt="avatar">
                <span th:unless="${review.avatar != null and review.avatar != ''}" th:text="${#strings.substring(review.username,0,1)}">U</span>
              </div>
              <span class="username" th:text="${review.nickname != null and review.nickname != ''} ? ${review.nickname} : ${review.username}">用户名</span>
            </div>
            <span class="comment-date" th:text="${review.createdAt}">日期</span>
          </div>
          <div class="comment-content" th:text="${review.content}">影评内容</div>
          <div class="comment-score" th:if="${review.score != null}">
            <span>⭐</span>
            <span th:text="${review.score} + ' 分'">0 分</span>
          </div>
          <div class="comment-actions">
            <button type="button"
                    th:class="${review.liked != null and review.liked} ? 'like-btn liked' : 'like-btn'"
                    th:data-review-id="${review.reviewId}"
                    th:data-liked="${review.liked != null and review.liked}"
                    onclick="toggleLike(this)">
              <span class="like-icon" th:text="${review.liked != null and review.liked} ? '❤️' : '🤍'">🤍</span>
              <span class="like-count" th:text="${review.likeCount != null ? review.likeCount : 0}">0</span>
            </button>
            <button type="button" class="reply-btn" th:onclick="|toggleReplyForm(${review.reviewId})|">
              💬 回复
            </button>
          </div>

          <!-- 回复列表 -->
          <div class="replies-list" th:if="${review.replies != null and !#lists.isEmpty(review.replies)}">
            <div class="reply" th:each="reply : ${review.replies}">
              <div class="reply-header">
                <div class="comment-user">
                  <div class="user-avatar" style="width:28px;height:28px;font-size:0.8rem;">
                    <img th:if="${reply.avatar != null and reply.avatar != ''}" th:src="${reply.avatar}" alt="avatar">
                    <span th:unless="${reply.avatar != null and reply.avatar != ''}" th:text="${#strings.substring(reply.username,0,1)}">U</span>
                  </div>
                  <span class="username" style="font-size:0.85rem;" th:text="${reply.nickname != null and reply.nickname != ''} ? ${reply.nickname} : ${reply.username}">用户名</span>
                </div>
                <span class="comment-date" style="font-size:0.8rem;" th:text="${reply.createdAt}">日期</span>
              </div>
              <div class="reply-content" th:text="${reply.content}">回复内容</div>
            </div>
          </div>

          <!-- 回复表单 -->
          <div class="reply-form" th:id="'reply-form-' + ${review.reviewId}">
            <form th:action="@{/user/replyReview}" method="post">
              <input type="hidden" name="parentId" th:value="${review.reviewId}">
              <input type="hidden" name="movieId" th:value="${movie.movieId}">
              <textarea name="content" placeholder="写下你的回复..." required></textarea>
              <div class="reply-form-actions">
                <button type="button" class="reply-cancel" th:onclick="|toggleReplyForm(${review.reviewId})|">取消</button>
                <button type="submit" class="reply-submit">提交回复</button>
              </div>
            </form>
          </div>
        </div>

        <!-- 空状态 -->
        <div class="empty-comments" th:if="${#lists.isEmpty(reviews)}">
          <div class="empty-icon">📝</div>
          <h3>暂无影评</h3>
          <p>来做第一个评价这部电影的人吧！</p>
        </div>

        <div class="write-review-bar">
          <button type="button" class="write-review-btn" onclick="openReviewModal()">
            <span>✏️</span>
            <span>写影评</span>
          </button>
        </div>
      </div>
    </main>
  </div>

  <!-- 写影评弹窗 -->
  <div class="modal-overlay" id="reviewModal" onclick="closeReviewModal(event)">
    <div class="modal-box" onclick="event.stopPropagation()">
      <div class="modal-header">
        <h2>📝 写影评</h2>
        <button type="button" class="modal-close" onclick="closeReviewModal()">✕</button>
      </div>
      <div class="modal-body">
        <form th:action="@{/user/submitreview}" method="POST">
          <input type="hidden" name="movieId" th:value="${movie.movieId}">

          <div class="modal-form-group">
            <label class="modal-form-label">评分</label>
            <select name="score" class="modal-form-select" required>
              <option value="">请选择评分</option>
              <option value="5">⭐⭐⭐⭐⭐ (5分 - 力荐)</option>
              <option value="4">⭐⭐⭐⭐ (4分 - 推荐)</option>
              <option value="3">⭐⭐⭐ (3分 - 还行)</option>
              <option value="2">⭐⭐ (2分 - 较差)</option>
              <option value="1">⭐ (1分 - 很差)</option>
            </select>
          </div>

          <div class="modal-form-group">
            <label class="modal-form-label">影评内容</label>
            <textarea name="content" class="modal-form-textarea" placeholder="写下你的观影感受..." required></textarea>
          </div>

          <button type="submit" class="modal-submit-btn">✨ 发布影评</button>
        </form>
      </div>
    </div>
  </div>
    <script th:replace="~{fragments :: userBarScript}"></script>
    <script>
        function toggleReplyForm(reviewId) {
            const form = document.getElementById('reply-form-' + reviewId);
            if (form) {
                form.classList.toggle('active');
                if (form.classList.contains('active')) {
                    const textarea = form.querySelector('textarea');
                    if (textarea) textarea.focus();
                }
            }
        }

        function openReviewModal() {
            document.getElementById('reviewModal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeReviewModal(event) {
            if (!event || event.target === document.getElementById('reviewModal')) {
                document.getElementById('reviewModal').classList.remove('active');
                document.body.style.overflow = '';
            }
        }

        function toggleLike(btn) {
            const reviewId = btn.dataset.reviewId;
            const liked = btn.dataset.liked === 'true';
            const formData = new FormData();
            formData.append('reviewId', reviewId);
            fetch('/user/likeReviewAjax', { method: 'POST', body: formData })
                .then(res => res.json())
                .then(data => {
                    if (!data || !data.success) { alert(data && data.message ? data.message : '操作失败'); return; }
                    const icon = btn.querySelector('.like-icon');
                    const countSpan = btn.querySelector('.like-count');
                    if (data.liked) {
                        btn.classList.add('liked');
                        icon.textContent = '❤️';
                        btn.dataset.liked = 'true';
                    } else {
                        btn.classList.remove('liked');
                        icon.textContent = '🤍';
                        btn.dataset.liked = 'false';
                    }
                    countSpan.textContent = data.likeCount != null ? data.likeCount : 0;
                })
                .catch(() => alert('操作失败，请重试'));
        }
    </script>
</body>
</html>
