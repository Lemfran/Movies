<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>cuit影评</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(-45deg, 
        #b8e2ff,
        #ffd6e6,
        #c9ffe5,
        #ffe1c4,
        #e2d6ff
      );
      background-size: 400% 400%;
      animation: gradientBG 15s ease infinite;
      margin: 0;
      padding: 0;
    }

    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .container {
      display: flex;
      min-height: 100vh;
    }

    .sidebar {
      width: 250px;
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(10px);
      padding: 30px;
      box-shadow: 5px 0 15px rgba(0,0,0,0.1);
      border-right: 1px solid rgba(255, 255, 255, 0.5);
      z-index: 1;
    }

    .sidebar h2 {
      color: #2c3e50;
      margin-bottom: 30px;
      font-size: 24px;
      border-bottom: 3px solid #8ec5e8;
      padding-bottom: 10px;
    }

    .sidebar a {
      display: block;
      margin-bottom: 15px;
      padding: 12px 20px;
      color: #2c3e50;
      text-decoration: none;
      border-radius: 12px;
      transition: all 0.3s ease;
      background: rgba(255, 255, 255, 0.5);
    }

    .sidebar a:hover {
      background: linear-gradient(45deg, #8ec5e8, #7fcac0);
      color: white;
      transform: translateX(5px);
    }

    .main-content {
      flex: 1;
      padding: 30px;
      background: rgba(255, 255, 255, 0.3);
      backdrop-filter: blur(5px);
    }

    .movie-box {
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(10px);
      padding: 25px;
      border-radius: 15px;
      margin-bottom: 30px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      transition: all 0.3s ease;
    }

    .movie-box:hover {
      transform: translateY(-5px);
      box-shadow: 0 8px 25px rgba(0,0,0,0.15);
    }

    .movie-box h1 {
      color: #2c3e50;
      margin-bottom: 20px;
      font-size: 28px;
      border-bottom: 3px solid #8ec5e8;
      padding-bottom: 10px;
      display: inline-block;
    }

    .movie-box img {
      width: 100%; /* 使图片宽度充满容器 */
      max-width: 300px; /* 设置最大宽度 */
      height: auto; /* 高度自动调整以保持宽高比 */
      object-fit: contain; /* 保持宽高比并适应容器 */
      border-radius: 12px;
      margin: 20px 0; /* 上下边距为 20px */
      box-shadow: 0 4px 8px rgba(0,0,0,0.2);
      display: block; /* 确保图片单独占据一行 */
    }

    .add-review-btn {
      display: inline-block;
      padding: 12px 25px;
      background: linear-gradient(45deg, #8ec5e8, #7fcac0);
      color: white;
      text-decoration: none;
      border-radius: 12px;
      margin-bottom: 20px;
      transition: all 0.3s ease;
      border: none;
      cursor: pointer;
      font-size: 16px;
      font-weight: 500;
      letter-spacing: 1px;
    }

    .add-review-btn:hover {
      background: linear-gradient(45deg, #7fcac0, #8ec5e8);
      transform: translateY(-2px);
      box-shadow: 0 4px 15px rgba(142, 197, 232, 0.4);
    }

    .comments {
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(10px);
      padding: 25px;
      border-radius: 15px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }

    .comments h2 {
      color: #2c3e50;
      margin-bottom: 20px;
      font-size: 24px;
      border-bottom: 3px solid #8ec5e8;
      padding-bottom: 10px;
      display: inline-block;
    }

    .comment {
      background: rgba(255, 255, 255, 0.7);
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 15px;
      transition: all 0.3s ease;
    }

    .comment:hover {
      transform: translateY(-3px);
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }

    .comment p {
      margin: 8px 0;
      color: #2c3e50;
      line-height: 1.6;
    }

    .comment strong {
      color: #34495e;
      font-size: 16px;
    }

    .comment span {
      color: #7f8c8d;
      font-size: 14px;
    }

    .score-display {
      display: inline-block;
      padding: 5px 12px;
      background: linear-gradient(45deg, #8ec5e8, #7fcac0);
      color: white;
      border-radius: 8px;
      margin-top: 10px;
    }

    @media (max-width: 768px) {
      .container {
        flex-direction: column;
      }
      .sidebar {
        width: 100%;
        padding: 20px;
      }
    }
  </style>
</head>
<body>
<div class="container">
  <div class="sidebar">
    <h2>cuit影评</h2>
    <a th:href="@{/movielist(userId=${user.userId})}">电影列表</a>
    <a th:href="@{/reviews(userId=${user.userId})}">评论列表</a>
    <a href="/">退出</a>
  </div>
  <div class="main-content">
    <div class="movie-box">
      <h1 th:text="${movie.title}"></h1>
      <img th:src="${movie.posterImage}" alt="Movie Poster">
      <p><strong>描述：</strong> <span th:text="${movie.description}"></span></p>
      <p><strong>上映时间：</strong> <span th:text="${movie.releaseDate}"></span></p>
      <p><strong>时长：</strong> <span th:text="${movie.runtime}"></span> 分钟</p>
      <p><strong>评分：</strong><span th:text="${movie.averageScore}"></span> 分</p>
    </div>
    
    <a class="add-review-btn" th:href="@{/addreview(movieId=${movie.movieId},userId=${user.userId})}">添加评论</a>
    
    <div class="comments">
      <h2>评论区</h2>
      <div class="comment" th:each="review : ${reviews}">
        <p><strong th:text="${review.username}">Username</strong> - <span th:text="${review.createdAt}">Date</span></p>
        <p th:text="${review.content}">Review text...</p>
        <div class="score-display">
          <strong>评分: </strong><span th:text="${review.score}">0.0</span>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
