spring.application.name=recommendation-service
server.port=8083

# Eureka Client
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.hostname=localhost

# Thymeleaf
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.cache=false

# ===== Resilience4j 容错配置 =====
# CircuitBreaker 熔断器配置
resilience4j.circuitbreaker.instances.movies-service.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.movies-service.slidingWindowSize=5
resilience4j.circuitbreaker.instances.movies-service.permittedNumberOfCallsInHalfOpenState=3
resilience4j.circuitbreaker.instances.movies-service.waitDurationInOpenState=10s
resilience4j.circuitbreaker.instances.movies-service.failureRateThreshold=50
resilience4j.circuitbreaker.instances.movies-service.eventConsumerBufferSize=10
resilience4j.circuitbreaker.instances.movies-service.record-exceptions=org.springframework.web.client.ResourceAccessException,java.net.ConnectException

# Retry 重试配置
resilience4j.retry.instances.movies-service.maxAttempts=3
resilience4j.retry.instances.movies-service.waitDuration=1s
resilience4j.retry.instances.movies-service.retry-exceptions=org.springframework.web.client.ResourceAccessException,java.net.ConnectException

# 日志配置
logging.level.org.springframework.web=INFO
logging.level.edu.cuit.recommendation=DEBUG
