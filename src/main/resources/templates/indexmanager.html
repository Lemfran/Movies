<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理员首页 - CUIT影评</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #f5f7fa;
            min-height: 100vh;
        }

        .container {
            display: flex;
            min-height: 100vh;
        }

        /* 侧边栏样式 */
        .sidebar {
            width: 260px;
            background: linear-gradient(180deg, #667eea 0%, #764ba2 100%);
            padding: 30px 20px;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
            z-index: 100;
        }

        .sidebar-header {
            text-align: center;
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.2);
        }

        .sidebar-header h2 {
            color: white;
            font-size: 24px;
            font-weight: 600;
        }

        .sidebar-header p {
            color: rgba(255,255,255,0.7);
            font-size: 12px;
            margin-top: 5px;
        }

        .nav-menu {
            list-style: none;
        }

        .nav-item {
            margin-bottom: 8px;
        }

        .nav-link {
            display: flex;
            align-items: center;
            padding: 14px 18px;
            color: rgba(255,255,255,0.9);
            text-decoration: none;
            border-radius: 12px;
            transition: all 0.3s ease;
            font-size: 15px;
        }

        .nav-link:hover {
            background: rgba(255,255,255,0.15);
            transform: translateX(5px);
        }

        .nav-link.active {
            background: rgba(255,255,255,0.2);
            color: white;
        }

        .nav-icon {
            width: 22px;
            height: 22px;
            margin-right: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .logout-btn {
            margin-top: auto;
            padding-top: 20px;
            border-top: 1px solid rgba(255,255,255,0.2);
        }

        .nav-section {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .nav-section-title {
            color: rgba(255,255,255,0.5);
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 15px;
            padding-left: 18px;
        }

        /* 主内容区域 */
        .main-content {
            flex: 1;
            margin-left: 260px;
            padding: 30px;
        }

        .header {
            background: white;
            padding: 25px 30px;
            border-radius: 16px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            margin-bottom: 30px;
        }

        .header h1 {
            color: #2d3748;
            font-size: 28px;
            font-weight: 700;
        }

        .header p {
            color: #718096;
            margin-top: 8px;
            font-size: 14px;
        }

        /* 统计卡片 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.12);
        }

        .stat-icon {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            margin-bottom: 15px;
        }

        .stat-icon.blue {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .stat-icon.green {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
        }

        .stat-icon.orange {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
        }

        .stat-icon.purple {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
        }

        .stat-value {
            font-size: 32px;
            font-weight: 700;
            color: #2d3748;
            margin-bottom: 5px;
        }

        .stat-label {
            color: #718096;
            font-size: 14px;
        }

        /* 管理功能 */
        .admin-section {
            background: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            margin-bottom: 30px;
        }

        .admin-section h3 {
            color: #2d3748;
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 20px;
        }

        .admin-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }

        .admin-btn {
            display: flex;
            align-items: center;
            padding: 20px;
            background: #f7fafc;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            text-decoration: none;
            color: #4a5568;
            transition: all 0.3s ease;
        }

        .admin-btn:hover {
            border-color: #667eea;
            background: white;
            transform: translateY(-3px);
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.15);
        }

        .admin-icon {
            width: 45px;
            height: 45px;
            border-radius: 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            margin-right: 15px;
        }

        .admin-text {
            font-size: 16px;
            font-weight: 600;
            color: #2d3748;
        }

        @media (max-width: 768px) {
            .sidebar {
                width: 100%;
                position: relative;
                height: auto;
            }

            .main-content {
                margin-left: 0;
            }

            .container {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 侧边栏 -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>CUIT影评</h2>
                <p>管理员控制台</p>
            </div>
            <nav>
                <ul class="nav-menu">
                    <li class="nav-item">
                        <a href="#" class="nav-link active">
                            <span class="nav-icon">🏠</span>
                            首页
                        </a>
                    </li>
                </ul>

                <div class="nav-section">
                    <div class="nav-section-title">功能管理</div>
                    <ul class="nav-menu">
                        <li class="nav-item">
                            <a th:href="@{/manager}" class="nav-link">
                                <span class="nav-icon">👥</span>
                                用户管理
                            </a>
                        </li>
                        <li class="nav-item">
                            <a th:href="@{/movieManage}" class="nav-link">
                                <span class="nav-icon">🎬</span>
                                电影管理
                            </a>
                        </li>
                        <li class="nav-item">
                            <a th:href="@{/reviewsManage}" class="nav-link">
                                <span class="nav-icon">💬</span>
                                评论管理
                            </a>
                        </li>
                        <li class="nav-item">
                            <a th:href="@{/logList}" class="nav-link">
                                <span class="nav-icon">📋</span>
                                系统日志
                            </a>
                        </li>
                    </ul>
                </div>

                <div class="nav-section">
                    <div class="nav-section-title">用户端预览</div>
                    <ul class="nav-menu">
                        <li class="nav-item">
                            <a th:href="@{/movielist}" class="nav-link" target="_blank">
                                <span class="nav-icon">🎬</span>
                                电影列表
                            </a>
                        </li>
                        <li class="nav-item">
                            <a th:href="@{/reviews}" class="nav-link" target="_blank">
                                <span class="nav-icon">💬</span>
                                评论列表
                            </a>
                        </li>
                    </ul>
                </div>

                <div class="nav-section">
                    <div class="nav-section-title">账户</div>
                    <ul class="nav-menu">
                        <li class="nav-item">
                            <a href="/" class="nav-link">
                                <span class="nav-icon">🚪</span>
                                退出登录
                            </a>
                        </li>
                    </ul>
                </div>
            </nav>
        </aside>

        <!-- 主内容区域 -->
        <main class="main-content">
            <div class="header">
                <h1>管理员控制台</h1>
                <p>欢迎使用 CUIT 影评系统管理后台</p>
            </div>

            <!-- 统计卡片 -->
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon blue">🎬</div>
                    <div class="stat-value" th:text="${movieCount} + '+'">0+</div>
                    <div class="stat-label">精彩电影</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon green">👥</div>
                    <div class="stat-value" th:text="${userCount} + '+'">0+</div>
                    <div class="stat-label">注册用户</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon orange">💬</div>
                    <div class="stat-value" th:text="${reviewCount} + '+'">0+</div>
                    <div class="stat-label">影评评论</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon purple">📊</div>
                    <div class="stat-value" th:text="${logCount} + '+'">0+</div>
                    <div class="stat-label">操作日志</div>
                </div>
            </div>

            <!-- 管理功能 -->
            <div class="admin-section">
                <h3>管理功能</h3>
                <div class="admin-grid">
                    <a th:href="@{/manager}" class="admin-btn">
                        <div class="admin-icon">👥</div>
                        <span class="admin-text">用户管理</span>
                    </a>
                    <a th:href="@{/movieManage}" class="admin-btn">
                        <div class="admin-icon">🎬</div>
                        <span class="admin-text">电影管理</span>
                    </a>
                    <a th:href="@{/reviewsManage}" class="admin-btn">
                        <div class="admin-icon">💬</div>
                        <span class="admin-text">评论管理</span>
                    </a>
                    <a th:href="@{/logList}" class="admin-btn">
                        <div class="admin-icon">📋</div>
                        <span class="admin-text">系统日志</span>
                    </a>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
