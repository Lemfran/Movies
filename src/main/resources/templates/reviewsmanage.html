<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>cuit影评（管理员）</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(-45deg,
      #b8e2ff,
      #ffd6e6,
      #c9ffe5,
      #ffe1c4,
      #e2d6ff
      );
      background-size: 400% 400%;
      animation: gradientBG 15s ease infinite;
      margin: 0;
      padding: 0;
    }

    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .container {
      display: flex;
      min-height: 100vh;
    }

    .sidebar {
      width: 250px;
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(10px);
      padding: 30px;
      box-shadow: 5px 0 15px rgba(0,0,0,0.1);
      border-right: 1px solid rgba(255, 255, 255, 0.5);
      z-index: 1;
    }

    .sidebar h2 {
      color: #2c3e50;
      margin-bottom: 30px;
      font-size: 24px;
      border-bottom: 3px solid #8ec5e8;
      padding-bottom: 10px;
    }

    .sidebar a {
      display: block;
      margin-bottom: 15px;
      padding: 12px 20px;
      color: #2c3e50;
      text-decoration: none;
      border-radius: 12px;
      transition: all 0.3s ease;
      background: rgba(255, 255, 255, 0.5);
    }

    .sidebar a:hover {
      background: linear-gradient(45deg, #8ec5e8, #7fcac0);
      color: white;
      transform: translateX(5px);
    }

    .main-content {
      flex: 1;
      padding: 30px;
      background: rgba(255, 255, 255, 0.3);
      backdrop-filter: blur(5px);
    }

    .reviews-container {
      max-width: 800px;
      margin: 0 auto;
    }

    .review-card {
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(10px);
      padding: 25px;
      border-radius: 15px;
      margin-bottom: 20px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      transition: all 0.3s ease;
    }

    .review-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 8px 25px rgba(0,0,0,0.15);
    }

    .review-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
      padding-bottom: 10px;
      border-bottom: 2px solid #8ec5e8;
    }

    .movie-title {
      color: #2c3e50;
      font-size: 20px;
      font-weight: bold;
    }

    .review-meta {
      color: #7f8c8d;
      font-size: 14px;
    }

    .review-content {
      color: #34495e;
      line-height: 1.6;
      margin: 15px 0;
      font-size: 16px;
    }

    .review-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 15px;
    }

    .score-badge {
      display: inline-block;
      padding: 5px 12px;
      background: linear-gradient(45deg, #8ec5e8, #7fcac0);
      color: white;
      border-radius: 8px;
      font-size: 14px;
    }

    .username {
      color: #2c3e50;
      font-weight: 500;
    }

    @media (max-width: 768px) {
      .container {
        flex-direction: column;
      }
      .sidebar {
        width: 100%;
        padding: 20px;
      }
      .reviews-container {
        padding: 10px;
      }
    }
  </style>
</head>
<body>
<div class="container">
  <div class="sidebar">
    <h2>cuit影评</h2>
    <a th:href="@{/userList(userId=${user.userId})}">用户列表</a>
    <a th:href="@{/movieManage(userId=${user.userId})}">电影列表</a>
    <a th:href="@{/reviewsManage(userId=${user.userId})}">评论列表</a>
    <a th:href="@{/logList(userId=${user.userId})}">日志</a>
    <a th:href="@{/movielist(userId=${user.userId})}">用户界面</a>
    <a href="/">退出</a>
  </div>

  <div class="main-content">
    <div class="reviews-container" >
      <form id="reviewForm" method="post" th:each="review : ${reviews}" th:action="@{/deleteReview(userId=${user.userId},reviewId=${review.reviewId})}">
        <div class="review-card">
          <div class="review-header">
            <p>电影：<span class="movie-title" th:text="${review.title}">电影名</span></p>
            <span class="review-meta" th:text="${review.createdAt}">日期</span>
          </div>
          <div class="review-content" th:text="${review.content}">Review content...</div>
          <div class="review-footer">
            <p>用户：<span class="username" th:text="${review.username}">Username</span></p>
            <span class="score-badge">
                                评分: <span th:text="${review.score}">0.0</span>
                            </span>
            <!-- 删除按钮 -->
            <button type="submit" >删除评论</button>
          </div>
        </div>
      </form>
    </div>
  </div>
</div>
</body>
</html>
