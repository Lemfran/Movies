<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log Information</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(-45deg,
            #b8e2ff,
            #ffd6e6,
            #c9ffe5,
            #ffe1c4,
            #e2d6ff
            );
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            margin: 0;
            padding: 0;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 250px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            padding: 30px;
            box-shadow: 5px 0 15px rgba(0,0,0,0.1);
            border-right: 1px solid rgba(255, 255, 255, 0.5);
            z-index: 1;
        }

        .sidebar h2 {
            color: #2c3e50;
            margin-bottom: 30px;
            font-size: 24px;
            border-bottom: 3px solid #8ec5e8;
            padding-bottom: 10px;
        }

        .sidebar a {
            display: block;
            margin-bottom: 15px;
            padding: 12px 20px;
            color: #2c3e50;
            text-decoration: none;
            border-radius: 12px;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.5);
        }

        .sidebar a:hover {
            background: linear-gradient(45deg, #8ec5e8, #7fcac0);
            color: white;
            transform: translateX(5px);
        }

        .main-content {
            flex: 1;
            padding: 30px;
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(5px);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 8px;
        }

        th {
            background-color: #f2f2f2;
            text-align: left;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="sidebar">
        <h2>cuit影评</h2>
        <a th:href="@{/userList(userId=${user.userId})}">用户列表</a>
        <a th:href="@{/movieManage(userId=${user.userId})}">电影列表</a>
        <a th:href="@{/reviewsManage(userId=${user.userId})}">评论列表</a>
        <a th:href="@{/logList(userId=${user.userId})}">日志</a>
        <a th:href="@{/movielist(userId=${user.userId})}">用户界面</a>
        <a href="/">退出</a>
    </div>

    <div class="main-content">
        <h1>日志</h1>
        <table>
            <tr>
                <th>方法</th>
                <th>调用者</th>
                <th>调用时间</th>
            </tr>
            <tr th:each="log : ${logs}">
                <td th:text="${log.methodName}">Method Name</td>
                <td th:text="${log.userName}">UserName</td>
                <td th:text="${log.timestamp}">Timestamp</td>
            </tr>
        </table>
    </div>
</div>
</body>
</html>
